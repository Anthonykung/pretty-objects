<!--
 * File: objectViewer.html

 * Author: Anthony Kung <hi@anth.dev> (https://anth.dev)
 * Created for: Pretty Objects VS Code extension object viewer webview
 * License: Apache-2.0
 *
 * Description:
 *   Object Viewer control surface for browsing, filtering, diffing, and
 *   editing large structured collections inside a VS Code webview.
 -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'nonce-__NONCE__';" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Object Viewer</title>
  <style>
    :root {
      --bg: var(--vscode-editor-background);
      --panel: var(--vscode-sideBar-background, var(--vscode-editor-background));
      --panel-2: var(--vscode-editorWidget-background, var(--vscode-editor-background));
      --border: var(--vscode-panel-border, var(--vscode-editorWidget-border, rgba(127, 127, 127, 0.35)));
      --text: var(--vscode-editor-foreground);
      --muted: var(--vscode-descriptionForeground, var(--vscode-editor-foreground));
      --accent: var(--vscode-focusBorder, var(--vscode-textLink-foreground, #4fc1ff));
      --danger: var(--vscode-errorForeground, #f14c4c);
      --success: var(--vscode-terminal-ansiGreen, #23d18b);
      --shadow: rgba(0, 0, 0, 0.18);
      --font-family: var(--vscode-editor-font-family, Consolas, 'SFMono-Regular', Menlo, monospace);
      --font-size: var(--vscode-editor-font-size, 13px);
      --font-weight: var(--vscode-editor-font-weight, 400);
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-family);
      font-size: var(--font-size);
      font-weight: var(--font-weight);
      line-height: 1.5;
    }
    .shell {
      min-height: 100vh;
      padding: 10px;
    }
    .panel {
      max-width: 100%;
      margin: 0 auto;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 8px 24px var(--shadow);
      overflow: hidden;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--panel-2);
    }
    .meta {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .badge {
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--muted);
      background: color-mix(in srgb, var(--panel-2) 88%, transparent);
    }
    .actions, .footer-actions, .secondary-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    button, select, input {
      border: 1px solid var(--border);
      background: var(--vscode-button-secondaryBackground, var(--panel-2));
      color: var(--text);
      border-radius: 6px;
      padding: 6px 10px;
      font: inherit;
    }
    input {
      background: var(--vscode-input-background, var(--vscode-editor-background));
      color: var(--vscode-input-foreground, var(--text));
    }
    button.primary {
      background: var(--vscode-button-background, var(--panel-2));
      color: var(--vscode-button-foreground, var(--text));
      border-color: color-mix(in srgb, var(--accent) 60%, transparent);
    }
    button.danger {
      border-color: color-mix(in srgb, var(--danger) 55%, transparent);
      color: var(--danger);
    }
    button:disabled, select:disabled {
      opacity: 0.45;
    }
    .body {
      padding: 12px;
      display: grid;
      gap: 10px;
    }
    .toolbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .stack {
      display: grid;
      gap: 10px;
    }
    .grid {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    }
    .status {
      min-height: 20px;
      color: var(--muted);
    }
    .status.error {
      color: var(--danger);
    }
    .status.success {
      color: var(--success);
    }
    .editor-note {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      background: var(--vscode-editor-background);
      color: var(--muted);
    }
    .section {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      background: var(--vscode-editor-background);
    }
    .section h3 {
      margin: 0 0 8px;
      font-size: 1em;
    }
    .field-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .field-row input {
      min-width: 120px;
      flex: 1 1 160px;
    }
    .list {
      max-height: 260px;
      overflow: auto;
      display: grid;
      gap: 6px;
    }
    .list-item {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: color-mix(in srgb, var(--vscode-editor-background) 92%, var(--panel-2));
    }
    .list-item.current {
      border-color: var(--accent);
    }
    .list-meta {
      min-width: 0;
      display: grid;
      gap: 2px;
    }
    .summary {
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 100%;
    }
    .small {
      color: var(--muted);
      font-size: 0.92em;
    }
    .footer {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .empty {
      color: var(--muted);
    }
    @media (max-width: 800px) {
      .topbar, .toolbar, .footer {
        flex-direction: column;
        align-items: stretch;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="panel">
      <div class="topbar">
        <div class="meta">
          <strong>Object Viewer</strong>
          <span class="badge" id="syntax"></span>
          <span class="badge" id="position"></span>
          <span class="badge" id="count"></span>
        </div>
        <div class="actions">
          <button id="prev">Previous</button>
          <button id="next">Next</button>
        </div>
      </div>
      <div class="body">
        <div class="toolbar">
          <div class="secondary-actions">
            <button id="insertBefore">Insert Before</button>
            <button id="insertAfter">Insert After</button>
            <button id="appendToEnd">Append To End</button>
            <button id="remove" class="danger">Remove</button>
          </div>
          <div class="secondary-actions">
            <input id="compareIndex" type="number" min="1" placeholder="Diff against index" />
            <button id="diff">Diff</button>
          </div>
        </div>
        <div id="status" class="status"></div>
        <div class="editor-note">
          The editor is backed by Pretty Objects memory, not a disk file. Use Save Item As File if you want to export the current item separately.
        </div>
        <div class="grid">
          <div class="section stack">
            <h3>Search</h3>
            <div class="field-row">
              <input id="searchQuery" type="text" placeholder="Search entire object text" />
              <button id="applySearch">Apply</button>
              <button id="clearSearch">Clear</button>
            </div>
            <div class="field-row">
              <button id="toggleEmptyObjects">Show Empty Objects Only</button>
              <button id="toggleDuplicateObjects">Show Duplicates Only</button>
            </div>
            <div id="searchMeta" class="small"></div>
          </div>
          <div class="section stack">
            <h3>Grouping</h3>
            <div class="field-row">
              <input id="groupPath" type="text" placeholder="Group path, e.g. meta.type" />
              <button id="applyGroup">Group</button>
              <button id="clearGroup">Clear</button>
            </div>
            <div id="groupMeta" class="small"></div>
            <div id="groupList" class="list"></div>
          </div>
        </div>
        <div class="grid">
          <div class="section stack">
            <h3>Navigation</h3>
            <div class="field-row">
              <input id="absoluteIndex" type="number" min="1" placeholder="Jump to absolute index" />
              <button id="jumpAbsolute">Go To Index</button>
            </div>
            <div class="field-row">
              <input id="resultIndex" type="number" min="1" placeholder="Jump to result #" />
              <button id="jumpResult">Go To Result</button>
            </div>
            <div class="field-row">
              <input id="resultPage" type="number" min="1" placeholder="Page #" />
              <button id="setResultPage">Go To Page</button>
            </div>
            <div class="field-row">
              <input id="resultsPerPage" type="number" min="1" placeholder="Objects per page" />
              <button id="setResultsPerPage">Set Page Size</button>
            </div>
            <div class="field-row">
              <button id="prevResultPage">Previous Page</button>
              <button id="nextResultPage">Next Page</button>
            </div>
            <div id="resultMeta" class="small"></div>
          </div>
          <div class="section stack">
            <h3>Visible Results</h3>
            <div id="resultList" class="list"></div>
          </div>
        </div>
        <div class="grid">
          <div class="section stack">
            <h3>Bulk Actions</h3>
            <div class="field-row">
              <select id="bulkAction">
                <option value="delete">Delete Objects</option>
                <option value="deleteEmptyObjects">Delete Empty Objects</option>
                <option value="deleteDuplicateObjects">Delete Duplicate Objects</option>
              </select>
              <select id="bulkScope">
                <option value="filtered">Filtered Results</option>
                <option value="page">Current Page</option>
                <option value="range">Absolute Range</option>
              </select>
              <button id="runBulkAction" class="danger">Run Bulk Action</button>
            </div>
            <div class="field-row">
              <input id="bulkRangeStart" type="number" min="1" placeholder="Start index" />
              <input id="bulkRangeEnd" type="number" min="1" placeholder="End index" />
            </div>
            <div id="bulkMeta" class="small"></div>
          </div>
        </div>
        <div class="footer">
          <div>
            <div id="empty" class="empty"></div>
            <div id="editorState" class="empty"></div>
            <div id="duplicateWarning" class="status error"></div>
            <div id="emptyObjectWarning" class="status error"></div>
          </div>
          <div class="footer-actions">
            <button id="reopenEditor">Reopen Item Editor</button>
            <button id="saveAsFile">Save Item As File</button>
            <button id="save">Save Object</button>
            <button id="apply" class="primary">Apply To Document</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script nonce="__NONCE__">
    const vscode = acquireVsCodeApi();
    const syntax = document.getElementById('syntax');
    const position = document.getElementById('position');
    const count = document.getElementById('count');
    const status = document.getElementById('status');
    const empty = document.getElementById('empty');
    const editorState = document.getElementById('editorState');
    const duplicateWarning = document.getElementById('duplicateWarning');
    const emptyObjectWarning = document.getElementById('emptyObjectWarning');
    const compareIndex = document.getElementById('compareIndex');
    const searchQuery = document.getElementById('searchQuery');
    const groupPath = document.getElementById('groupPath');
    const searchMeta = document.getElementById('searchMeta');
    const groupMeta = document.getElementById('groupMeta');
    const resultMeta = document.getElementById('resultMeta');
    const bulkMeta = document.getElementById('bulkMeta');
    const groupList = document.getElementById('groupList');
    const resultList = document.getElementById('resultList');
    const absoluteIndex = document.getElementById('absoluteIndex');
    const resultIndex = document.getElementById('resultIndex');
    const resultPage = document.getElementById('resultPage');
    const resultsPerPage = document.getElementById('resultsPerPage');
    const bulkAction = document.getElementById('bulkAction');
    const bulkScope = document.getElementById('bulkScope');
    const bulkRangeStart = document.getElementById('bulkRangeStart');
    const bulkRangeEnd = document.getElementById('bulkRangeEnd');
    const controls = {
      prev: document.getElementById('prev'),
      next: document.getElementById('next'),
      save: document.getElementById('save'),
      apply: document.getElementById('apply'),
      reopenEditor: document.getElementById('reopenEditor'),
      saveAsFile: document.getElementById('saveAsFile'),
      insertBefore: document.getElementById('insertBefore'),
      insertAfter: document.getElementById('insertAfter'),
      appendToEnd: document.getElementById('appendToEnd'),
      remove: document.getElementById('remove'),
      diff: document.getElementById('diff'),
      applySearch: document.getElementById('applySearch'),
      clearSearch: document.getElementById('clearSearch'),
      toggleEmptyObjects: document.getElementById('toggleEmptyObjects'),
      toggleDuplicateObjects: document.getElementById('toggleDuplicateObjects'),
      applyGroup: document.getElementById('applyGroup'),
      clearGroup: document.getElementById('clearGroup'),
      jumpAbsolute: document.getElementById('jumpAbsolute'),
      jumpResult: document.getElementById('jumpResult'),
      prevResultPage: document.getElementById('prevResultPage'),
      nextResultPage: document.getElementById('nextResultPage'),
      setResultPage: document.getElementById('setResultPage'),
      setResultsPerPage: document.getElementById('setResultsPerPage'),
      runBulkAction: document.getElementById('runBulkAction'),
    };

    function post(type, extra = {}) {
      vscode.postMessage({ type, ...extra });
    }

    controls.prev.addEventListener('click', () => post('navigate', { delta: -1 }));
    controls.next.addEventListener('click', () => post('navigate', { delta: 1 }));
    controls.save.addEventListener('click', () => post('saveItem'));
    controls.apply.addEventListener('click', () => post('applyDocument'));
    controls.reopenEditor.addEventListener('click', () => post('reopenEditor'));
    controls.saveAsFile.addEventListener('click', () => post('saveAsFile'));
    controls.insertBefore.addEventListener('click', () => post('insertItem', { position: 'before' }));
    controls.insertAfter.addEventListener('click', () => post('insertItem', { position: 'after' }));
    controls.appendToEnd.addEventListener('click', () => post('insertItem', { position: 'end' }));
    controls.remove.addEventListener('click', () => post('removeItem'));
    controls.diff.addEventListener('click', () => post('openDiff', { compareIndex: Number(compareIndex.value) - 1 }));
    controls.applySearch.addEventListener('click', () => post('setSearch', { query: searchQuery.value }));
    controls.clearSearch.addEventListener('click', () => post('clearSearch'));
    controls.toggleEmptyObjects.addEventListener('click', () => post('toggleEmptyObjects'));
    controls.toggleDuplicateObjects.addEventListener('click', () => post('toggleDuplicateObjects'));
    controls.applyGroup.addEventListener('click', () => post('setGroupPath', { path: groupPath.value }));
    controls.clearGroup.addEventListener('click', () => post('clearGroup'));
    controls.jumpAbsolute.addEventListener('click', () => post('jumpAbsolute', { index: Number(absoluteIndex.value) - 1 }));
    controls.jumpResult.addEventListener('click', () => post('jumpResult', { position: Number(resultIndex.value) - 1 }));
    controls.prevResultPage.addEventListener('click', () => post('changeResultPage', { delta: -1 }));
    controls.nextResultPage.addEventListener('click', () => post('changeResultPage', { delta: 1 }));
    controls.setResultPage.addEventListener('click', () => post('setResultPage', { page: Number(resultPage.value) - 1 }));
    controls.setResultsPerPage.addEventListener('click', () => post('setResultsPerPage', { value: Number(resultsPerPage.value) }));
    controls.runBulkAction.addEventListener('click', () => post('runBulkAction', {
      action: bulkAction.value,
      scope: bulkScope.value,
      rangeStart: Number(bulkRangeStart.value) - 1,
      rangeEnd: Number(bulkRangeEnd.value) - 1,
    }));

    window.addEventListener('message', (event) => {
      const data = event.data;
      syntax.textContent = data.syntaxLabel;
      position.textContent = data.positionLabel;
      count.textContent = data.countLabel;
      searchQuery.value = data.searchQuery || '';
      groupPath.value = data.groupPath || '';
      searchMeta.textContent = data.searchMeta || '';
      groupMeta.textContent = data.groupMeta || '';
      resultMeta.textContent = data.resultMeta || '';
      bulkMeta.textContent = data.bulkMeta || '';
      empty.textContent = data.emptyMessage || '';
      editorState.textContent = data.editorStateLabel || '';
      duplicateWarning.textContent = data.duplicateWarning || '';
      emptyObjectWarning.textContent = data.emptyObjectWarning || '';
      status.textContent = data.statusMessage || '';
      status.className = 'status' + (data.statusKind ? ' ' + data.statusKind : '');
      compareIndex.value = data.suggestedCompareIndex || '';
      absoluteIndex.value = data.absoluteIndexValue || '';
      resultIndex.value = data.resultIndexValue || '';
      resultPage.value = data.resultPageValue || '';
      resultsPerPage.value = data.resultsPerPageValue || '100';
      controls.toggleEmptyObjects.textContent = data.emptyToggleLabel || 'Show Empty Objects Only';
      controls.toggleDuplicateObjects.textContent = data.duplicateToggleLabel || 'Show Duplicates Only';

      for (const [name, control] of Object.entries(controls)) {
        control.disabled = !data.enabled[name];
      }

      groupList.innerHTML = '';
      for (const group of data.groupEntries) {
        const row = document.createElement('div');
        row.className = 'list-item' + (group.active ? ' current' : '');
        const meta = document.createElement('div');
        meta.className = 'list-meta';
        const label = document.createElement('strong');
        label.textContent = group.label;
        const countText = document.createElement('div');
        countText.className = 'small';
        countText.textContent = group.countLabel;
        meta.appendChild(label);
        meta.appendChild(countText);
        const action = document.createElement('button');
        action.textContent = group.active ? 'Active' : 'Open';
        action.disabled = group.active;
        action.addEventListener('click', () => post('selectGroup', { value: group.value }));
        row.appendChild(meta);
        row.appendChild(action);
        groupList.appendChild(row);
      }

      resultList.innerHTML = '';
      for (const entry of data.resultEntries) {
        const row = document.createElement('div');
        row.className = 'list-item' + (entry.current ? ' current' : '');
        const meta = document.createElement('div');
        meta.className = 'list-meta';
        const title = document.createElement('strong');
        title.textContent = entry.title;
        const summary = document.createElement('div');
        summary.className = 'summary';
        summary.textContent = entry.summary;
        meta.appendChild(title);
        meta.appendChild(summary);
        const action = document.createElement('button');
        action.textContent = entry.current ? 'Open' : 'Jump';
        action.addEventListener('click', () => post('openResult', { index: entry.index }));
        row.appendChild(meta);
        row.appendChild(action);
        resultList.appendChild(row);
      }
    });

    /*
     * File: objectViewer.html
     * Section: object viewer console banner
     * Purpose:
     *   Emit a small debug banner when the object viewer page loads.
     * Compatibility:
     *   Uses globalThis.console so the call is safe in both VS Code webviews
     *   and standard browsers without depending on extension-only APIs.
     */
    globalThis.console?.log(
      [
        "██████╗ ██████╗ ███████╗████████╗████████╗██╗   ██╗       ",
        "██╔══██╗██╔══██╗██╔════╝╚══██╔══╝╚══██╔══╝╚██╗ ██╔╝       ",
        "██████╔╝██████╔╝█████╗     ██║      ██║    ╚████╔╝        ",
        "██╔═══╝ ██╔══██╗██╔══╝     ██║      ██║     ╚██╔╝         ",
        "██║     ██║  ██║███████╗   ██║      ██║      ██║          ",
        "╚═╝     ╚═╝  ╚═╝╚══════╝   ╚═╝      ╚═╝      ╚═╝          ",
        "",
        "Object Viewer",
        "Author  : Anthony Kung (anth.dev)",
        "License : Apache-2.0",
        "Runtime : VS Code",
        "Status  : object viewer loaded",
      ].join("\n"),
    );

    vscode.postMessage({ type: 'ready' });
  </script>
</body>
</html>
